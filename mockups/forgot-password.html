<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TFP Mockup - Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0F1115] text-white">
  <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_20%,rgba(111,75,255,.25),transparent_35%),radial-gradient(circle_at_80%_80%,rgba(163,255,255,.12),transparent_35%)]"></div>
  <main class="min-h-screen grid place-items-center p-4">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl p-8 shadow-2xl shadow-black/40">
      <a href="login.html" class="inline-flex items-center gap-2 text-sm text-white/60 hover:text-white mb-6">← Back to Login</a>
      <h1 class="text-3xl font-bold tracking-tight">Reset Password</h1>
      <p class="text-white/60 mt-2 mb-6">Enter your email and we will send reset instructions.</p>
      <form class="space-y-4">
        <label class="block text-sm text-white/80">Email
          <input type="email" placeholder="you@example.com" class="mt-1 w-full rounded-xl border border-white/15 bg-black/20 px-4 py-3 outline-none focus:border-[#A3FFFF]" />
        </label>
        <button type="button" class="w-full rounded-xl bg-gradient-to-r from-[#6F4BFF] to-[#A36BFF] px-4 py-3 font-semibold">Send Reset Link</button>
      </form>
    </section>
  </main>
<script>window.addEventListener('load',()=>{if(window.lucide){window.lucide.createIcons();}});</script>
</body>
</html>
