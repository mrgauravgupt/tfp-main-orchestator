<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TFP Mockup - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0F1115] text-white">
  <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_20%,rgba(111,75,255,.25),transparent_35%),radial-gradient(circle_at_80%_80%,rgba(163,255,255,.12),transparent_35%)]"></div>
  <main class="min-h-screen grid place-items-center p-4">
    <section class="w-full max-w-lg rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl p-8 shadow-2xl shadow-black/40">
      <a href="home.html" class="inline-flex items-center gap-2 text-sm text-white/60 hover:text-white mb-6">← Back to Home</a>
      <h1 class="text-3xl font-bold tracking-tight">Create Account</h1>
      <p class="text-white/60 mt-2 mb-6">Join the global network for visual creators.</p>
      <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="block text-sm text-white/80 md:col-span-1">First Name
          <input type="text" class="mt-1 w-full rounded-xl border border-white/15 bg-black/20 px-4 py-3 outline-none focus:border-[#A3FFFF]" />
        </label>
        <label class="block text-sm text-white/80 md:col-span-1">Last Name
          <input type="text" class="mt-1 w-full rounded-xl border border-white/15 bg-black/20 px-4 py-3 outline-none focus:border-[#A3FFFF]" />
        </label>
        <label class="block text-sm text-white/80 md:col-span-2">Email
          <input type="email" class="mt-1 w-full rounded-xl border border-white/15 bg-black/20 px-4 py-3 outline-none focus:border-[#A3FFFF]" />
        </label>
        <label class="block text-sm text-white/80 md:col-span-2">Password
          <input type="password" class="mt-1 w-full rounded-xl border border-white/15 bg-black/20 px-4 py-3 outline-none focus:border-[#A3FFFF]" />
        </label>
        <label class="md:col-span-2 inline-flex items-center gap-2 text-xs text-white/60">
          <input type="checkbox" class="accent-[#6F4BFF]" /> I agree to the Terms and Privacy Policy
        </label>
        <button type="button" class="md:col-span-2 w-full rounded-xl bg-gradient-to-r from-[#6F4BFF] to-[#A36BFF] px-4 py-3 font-semibold">Create Account</button>
      </form>
      <p class="mt-6 text-sm text-white/60">Already have an account? <a class="text-[#A3FFFF] hover:underline" href="login.html">Sign in</a></p>
    </section>
  </main>
<script>window.addEventListener('load',()=>{if(window.lucide){window.lucide.createIcons();}});</script>
</body>
</html>
