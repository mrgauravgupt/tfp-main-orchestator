<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TFP Mockup - Google Auth Callback</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0F1115] text-white grid place-items-center p-4">
  <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 text-center backdrop-blur-xl">
    <div class="mx-auto mb-4 h-12 w-12 rounded-2xl bg-gradient-to-tr from-[#6F4BFF] to-[#A3FFFF]"></div>
    <h1 class="text-2xl font-bold">Connecting Google Account</h1>
    <p class="mt-2 text-white/60">Verifying credentials and redirecting to your dashboard...</p>
    <div class="mt-6 h-2 w-full overflow-hidden rounded-full bg-white/10"><div class="h-full w-2/3 animate-pulse rounded-full bg-[#A3FFFF]"></div></div>
    <a href="home.html" class="mt-6 inline-block text-sm text-[#A3FFFF]">Continue manually</a>
  </section>
<script>window.addEventListener('load',()=>{if(window.lucide){window.lucide.createIcons();}});</script>
</body>
</html>
