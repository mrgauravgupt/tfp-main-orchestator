<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TFP Photographers - Standalone App Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --surface: #12161f;
      --surface-2: #191e28;
      --surface-3: #202734;
      --text: #f7f8fb;
      --secondary: #c7ccd7;
      --muted: #98a2b5;
      --faint: #717b8d;
      --border: rgba(255, 255, 255, 0.12);
      --border-soft: rgba(255, 255, 255, 0.075);
      --cyan: #65f4ff;
      --violet: #7646ff;
      --amber: #f6b73c;
      --danger: #ef4444;
      --success: #22c55e;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 22px 64px rgba(0, 0, 0, 0.28);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at 44% 18%, rgba(91, 119, 255, 0.15), transparent 30rem),
        radial-gradient(circle at 58% 50%, rgba(101, 244, 255, 0.08), transparent 28rem),
        linear-gradient(180deg, #0d1017 0%, var(--bg) 56%, #07080c 100%);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    h1, h2, h3, p { margin: 0; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10, 12, 17, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .nav {
      width: min(1224px, calc(100% - 32px));
      min-height: 82px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #65f4ff, #6b5cff 58%, #9357ff);
      box-shadow: 0 0 28px rgba(118, 70, 255, 0.56);
    }

    .nav-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
    }

    .nav-link {
      display: grid;
      justify-items: center;
      gap: 4px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .nav-link span:first-child {
      font-size: 20px;
      line-height: 1;
      opacity: 0.82;
    }

    .nav-link.is-active { color: var(--cyan); }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .global-search {
      width: min(305px, 25vw);
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      background: rgba(18, 22, 30, 0.78);
      color: var(--muted);
      padding: 0 16px;
      font-size: 14px;
    }

    .global-search input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .locale-pill, .join-btn, .menu-btn, .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
    }

    .join-btn, .btn-primary {
      border: 0;
      background: linear-gradient(135deg, #5a4cff, #8c3dff);
      box-shadow: 0 16px 32px rgba(118, 70, 255, 0.34);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.045);
    }

    .btn-danger {
      border-color: rgba(239, 68, 68, 0.34);
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
    }

    .menu-btn { display: none; width: 44px; padding: 0; }

    .container {
      width: min(1216px, calc(100% - 32px));
      margin: 0 auto;
    }

    .view {
      display: none;
      padding: 34px 0 88px;
    }

    .view.is-active {
      display: block;
      animation: page-in 240ms ease both;
    }

    @keyframes page-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .page-header h1 {
      font-size: clamp(32px, 4.2vw, 56px);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .page-header p {
      max-width: 720px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .home-hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: 26px;
      align-items: stretch;
    }

    .home-copy, .panel, .listing-search-panel {
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018)),
        rgba(18, 22, 30, 0.74);
      box-shadow: var(--shadow);
    }

    .home-copy {
      min-height: 520px;
      padding: clamp(28px, 5vw, 58px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      border: 1px solid rgba(101, 244, 255, 0.24);
      border-radius: 999px;
      background: rgba(101, 244, 255, 0.08);
      color: var(--cyan);
      padding: 0 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .home-copy h1 {
      margin-top: 22px;
      font-size: clamp(46px, 7vw, 86px);
      line-height: 0.92;
      letter-spacing: -0.035em;
    }

    .home-copy p, .lead {
      margin-top: 20px;
      color: var(--secondary);
      font-size: 17px;
      line-height: 1.75;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .home-gallery {
      min-height: 520px;
      display: grid;
      grid-template-columns: 1.16fr 0.84fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      background: rgba(18, 22, 30, 0.78);
      box-shadow: var(--shadow);
    }

    .photo {
      min-height: 0;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background-image: var(--img);
      background-position: center;
      background-size: cover;
    }

    .photo-main { grid-row: span 2; }
    .p-city { --img: url("https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1200&q=80"); }
    .p-fashion { --img: url("https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=1200&q=80"); }
    .p-model { --img: url("https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80"); }
    .p-portrait { --img: url("https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=900&q=80"); }
    .p-editorial { --img: url("https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=1200&q=80"); }
    .p-studio { --img: url("https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80"); }
    .p-runway { --img: url("https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=900&q=80"); }
    .p-event { --img: url("https://images.unsplash.com/photo-1544717302-de2939b7ef71?auto=format&fit=crop&w=900&q=80"); }

    .listing-search-panel {
      display: grid;
      grid-template-columns: 1fr 0.8fr 0.8fr 0.8fr auto;
      gap: 8px;
      padding: 12px;
      margin: 20px 0;
      box-shadow: none;
    }

    .field {
      min-height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: var(--radius-md);
      background: rgba(12, 15, 21, 0.68);
      color: var(--text);
      padding: 0 16px;
      outline: 0;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 26px;
    }

    .pill {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      padding: 0 14px;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .pill.active {
      border-color: rgba(118, 70, 255, 0.45);
      background: rgba(118, 70, 255, 0.2);
      color: var(--text);
    }

    .listing-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .listing-card {
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-xl);
      background: rgba(18, 22, 30, 0.74);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.22);
    }

    .listing-media {
      height: 330px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 5px;
      padding: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .listing-media .photo:first-child { grid-row: span 2; }
    .listing-card-body { padding: 20px; }
    .meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      color: rgba(255, 255, 255, 0.82);
      padding: 0 12px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge.accent {
      border-color: rgba(101, 244, 255, 0.24);
      background: rgba(101, 244, 255, 0.08);
    }

    .listing-card h2 {
      margin-top: 10px;
      font-size: 21px;
      line-height: 1.25;
    }

    .listing-card p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .listing-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .detail-split-hero {
      min-height: 384px;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      background: linear-gradient(135deg, #171b27, #10131b);
      box-shadow: var(--shadow);
    }

    .detail-split-media {
      min-height: 384px;
      clip-path: polygon(0 0, 94% 0, 82% 100%, 0 100%);
      border-radius: 0;
    }

    .detail-split-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 48px 48px 16px;
    }

    .detail-split-content h1 {
      max-width: 680px;
      font-size: clamp(36px, 5vw, 56px);
      font-style: italic;
      font-weight: 950;
      line-height: 0.96;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .detail-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 24px 0 28px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(18, 22, 30, 0.62);
    }

    .tab {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .tab.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(118, 70, 255, 0.22), rgba(101, 244, 255, 0.08));
      box-shadow: inset 0 -2px 0 var(--violet);
    }

    .detail-layout, .project-detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(300px, 0.88fr);
      gap: 24px;
      align-items: start;
    }

    .about-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 16px;
    }

    .about-card, .side-card, .form-card {
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.058), rgba(255, 255, 255, 0.018)),
        rgba(18, 22, 30, 0.7);
      padding: 24px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
    }

    .about-card h2, .side-card h3, .form-card h2 { font-size: 24px; }
    .about-card p, .side-card p {
      margin-top: 12px;
      color: var(--secondary);
      line-height: 1.7;
    }

    .fact-list { display: grid; gap: 12px; }
    .fact {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 13px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.035);
    }
    .fact span { color: var(--muted); font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: 0.08em; }
    .fact strong { text-align: right; }

    .project-moodboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 158px 158px;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      background: rgba(18, 22, 30, 0.72);
      box-shadow: var(--shadow);
    }
    .project-moodboard .photo:first-child { grid-row: span 2; }

    .project-info { margin-top: 22px; }
    .side-stack { display: grid; gap: 16px; }

    .submissions-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .submission-card {
      position: relative;
      min-height: 245px;
      overflow: hidden;
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      background: var(--surface);
    }
    .submission-card .photo { position: absolute; inset: 0; border: 0; border-radius: 0; }
    .submission-meta {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      display: flex;
      justify-content: space-between;
      border-radius: var(--radius-md);
      background: rgba(8, 10, 15, 0.72);
      backdrop-filter: blur(14px);
      padding: 11px;
      font-size: 12px;
      font-weight: 850;
    }

    .form-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.72fr) minmax(0, 1.28fr);
      gap: 24px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input, select, textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-md);
      background: rgba(11, 14, 20, 0.76);
      color: var(--text);
      padding: 12px 14px;
      outline: 0;
    }
    textarea { min-height: 132px; resize: vertical; }

    .upload-zone {
      min-height: 190px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed rgba(101, 244, 255, 0.28);
      border-radius: var(--radius-lg);
      background: rgba(101, 244, 255, 0.045);
      color: var(--muted);
      margin-top: 18px;
      padding: 20px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      display: none;
      border: 1px solid rgba(34, 197, 94, 0.34);
      border-radius: var(--radius-md);
      background: rgba(11, 31, 24, 0.94);
      color: #dcfce7;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }

    @media (max-width: 1000px) {
      .nav { grid-template-columns: auto auto; }
      .nav-center, .global-search, .locale-pill, .join-btn { display: none; }
      .menu-btn { display: inline-flex; }
      .home-hero, .detail-layout, .project-detail-layout, .form-layout { grid-template-columns: 1fr; }
      .listing-search-panel { grid-template-columns: 1fr 1fr; }
      .submissions-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .container, .nav { width: min(100% - 24px, 1216px); }
      .view { padding-top: 22px; padding-bottom: 74px; }
      .brand { font-size: 16px; }
      .home-copy { min-height: 0; padding: 24px; }
      .home-copy h1 { font-size: clamp(40px, 13vw, 58px); }
      .home-gallery { min-height: 380px; grid-template-columns: 1fr 1fr; }
      .home-gallery .photo-main { grid-column: span 2; grid-row: auto; }
      .page-header { display: grid; }
      .listing-search-panel, .listing-grid, .about-grid, .form-grid, .submissions-grid { grid-template-columns: 1fr; }
      .listing-media { height: 270px; }
      .detail-split-hero { grid-template-columns: 1fr; }
      .detail-split-media { clip-path: none; min-height: 230px; }
      .detail-split-content { padding: 24px; }
      .detail-tabs { border-radius: var(--radius-lg); grid-template-columns: 1fr; }
      .project-moodboard { grid-template-rows: 170px 120px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <nav class="nav">
      <a href="#home" class="brand">
        <span class="brand-mark">▣</span>
        <span>TFP PLATFORM</span>
      </a>
      <div class="nav-center">
        <a href="#home" class="nav-link"><span>⌘</span><span>Home</span></a>
        <a href="#projects" class="nav-link"><span>▧</span><span>Opportunities</span></a>
        <a href="#contests" class="nav-link"><span>♕</span><span>Contests</span></a>
        <a href="#events" class="nav-link"><span>□</span><span>Events</span></a>
      </div>
      <div class="nav-actions">
        <label class="global-search">⌕ <input placeholder="Search opportunities, contests, events..." /></label>
        <span class="locale-pill">◎ EN · IN</span>
        <a class="join-btn" href="#create-project">JoinNow</a>
        <button class="menu-btn">☰</button>
      </div>
    </nav>
  </header>

  <main class="container">
    <section id="home" class="view"></section>
    <section id="projects" class="view"></section>
    <section id="contests" class="view"></section>
    <section id="events" class="view"></section>
    <section id="project-detail" class="view"></section>
    <section id="contest-detail" class="view"></section>
    <section id="event-detail" class="view"></section>
    <section id="submissions" class="view"></section>
    <section id="create-project" class="view"></section>
    <section id="create-contest" class="view"></section>
    <section id="create-event" class="view"></section>
  </main>

  <div class="toast" id="toast">Saved</div>

  <script>
    const data = {
      projects: [
        { title: "Fashion Editorial Shoot", place: "New York, USA", date: "2 May - 9 May", kind: "Portfolio Collaboration", pay: "TFP", role: "Model", desc: "Looking for models for a high-end fashion editorial. Will provide professional photos for portfolio. Outdoor and studio locations available.", imgs: ["p-fashion", "p-model", "p-editorial"] },
        { title: "Urban Portrait Series", place: "Los Angeles, USA", date: "18 May", kind: "Editorial", pay: "Paid", role: "Model", desc: "Creating an urban portrait series in downtown LA. Looking for diverse faces with unique looks. Edited digital files included.", imgs: ["p-portrait", "p-studio", "p-runway"] }
      ],
      contests: [
        { title: "Street Photography Challenge", place: "Global", date: "Apr 24 - May 8", kind: "Creative Challenge", pay: "3 prizes", desc: "Capture the essence of urban life in your city. Best street photography wins premium camera gear.", imgs: ["p-city", "p-portrait", "p-event"] },
        { title: "Monochrome Portrait Awards", place: "Online", date: "May 10 - Jun 2", kind: "Portrait Contest", pay: "$1,500 pool", desc: "Black and white portraits judged for lighting, character, and refined post-production.", imgs: ["p-studio", "p-model", "p-fashion"] }
      ],
      events: [
        { title: "Golden Hour Portfolio Walk", place: "London, UK", date: "May 12", kind: "Meetup", pay: "RSVP", desc: "A guided creator meetup for photographers and models to build fresh natural-light portfolio work.", imgs: ["p-city", "p-editorial", "p-model"] },
        { title: "Studio Lighting Intensive", place: "Delhi, India", date: "May 20", kind: "Workshop", pay: "Limited seats", desc: "Hands-on beauty lighting workshop covering modifiers, posing direction, and tethered review.", imgs: ["p-studio", "p-portrait", "p-runway"] }
      ]
    };

    const views = [...document.querySelectorAll(".view")];
    const toast = document.querySelector("#toast");

    function listingCard(item, type) {
      const hash = type === "projects" ? "#project-detail" : type === "contests" ? "#contest-detail" : "#event-detail";
      return `
        <article class="listing-card">
          <a href="${hash}">
            <div class="listing-media">
              <div class="photo ${item.imgs[0]}"></div>
              <div class="photo ${item.imgs[1]}"></div>
              <div class="photo ${item.imgs[2]}"></div>
            </div>
            <div class="listing-card-body">
              <div class="meta-row">⌖ ${item.place} <span>·</span> ${item.date}</div>
              <div class="badge-row"><span class="badge accent">${item.pay}</span><span class="badge">${item.kind}</span></div>
              <h2>${item.title}</h2>
              <p>${item.desc}</p>
              <div class="listing-footer">
                <span class="btn btn-secondary">View Details →</span>
                <span class="badge">Report</span>
              </div>
            </div>
          </a>
        </article>`;
    }

    function listingPage(type, title, subtitle, createHash) {
      const items = data[type];
      return `
        <header class="page-header">
          <div>
            <h1>${title}</h1>
            <p>${subtitle}</p>
          </div>
          <a class="btn btn-primary" href="${createHash}">Create</a>
        </header>
        <div class="listing-search-panel">
          <input class="field" placeholder="Search ${type}" />
          <select class="field"><option>All categories</option><option>Fashion</option><option>Portrait</option></select>
          <select class="field"><option>Any role</option><option>Model</option><option>Photographer</option></select>
          <select class="field"><option>Any compensation</option><option>TFP</option><option>Paid</option></select>
          <button class="btn btn-primary">Search</button>
        </div>
        <div class="filter-pills"><span class="pill active">View all</span><span class="pill">Upcoming</span><span class="pill">In progress</span><span class="pill">Completed</span></div>
        <div class="listing-grid">${items.map(item => listingCard(item, type)).join("")}</div>`;
    }

    function contestDetail() {
      const item = data.contests[0];
      return `
        <section class="detail-split-hero">
          <div class="photo detail-split-media ${item.imgs[0]}"></div>
          <div class="detail-split-content">
            <h1>${item.title}</h1>
            <div class="badge-row"><span class="badge">▣ Apr 24, 2026</span><span class="badge">◴ May 8, 2026</span><span class="badge">★ Active</span><span class="badge">♕ 3 prizes</span></div>
            <div class="hero-actions"><a class="btn btn-primary" href="#submissions">Submit Entry</a></div>
          </div>
        </section>
        <div class="detail-tabs"><button class="tab active">▤ Contest Details</button><button class="tab">♕ Prizes</button><button class="tab">▦ Submissions</button></div>
        <section class="detail-layout">
          <div class="about-grid">
            <article class="about-card">
              <span class="eyebrow">Contest details</span>
              <h2 style="margin-top:18px">${item.title}</h2>
              <p>${item.desc}</p>
            </article>
            <aside class="side-card">
              <div class="fact-list">
                <div class="fact"><span>Starts</span><strong>Apr 24, 2026</strong></div>
                <div class="fact"><span>Deadline</span><strong>May 8, 2026</strong></div>
                <div class="fact"><span>Status</span><strong>Active</strong></div>
                <div class="fact"><span>Prizes</span><strong>3 prizes</strong></div>
              </div>
            </aside>
            <article class="about-card">
              <h2>Resource Pack</h2>
              <p>Review the brief and reference files before you submit.</p>
              <div class="badge-row"><span class="btn btn-secondary">▧ Image 1.jpg</span><span class="btn btn-secondary">▧ Image 2.jpg</span></div>
            </article>
            <article class="about-card">
              <h2>Submit Entry</h2>
              <p>Upload one final image per entry. Submissions are moderated before appearing in the gallery.</p>
              <div class="upload-zone">↑<br><strong>Browse image</strong><br>JPG, PNG, or WebP up to 10MB</div>
            </article>
          </div>
          <aside class="side-stack"><section class="side-card"><h3>Contest actions</h3><p>Sign in to submit, vote, and save shortlisted images.</p><button class="btn btn-primary" style="width:100%" data-save>Submit Entry</button></section></aside>
        </section>`;
    }

    function projectDetail() {
      const item = data.projects[0];
      return `
        <section class="project-detail-layout">
          <div>
            <div class="project-moodboard"><div class="photo ${item.imgs[0]}"></div><div class="photo ${item.imgs[1]}"></div><div class="photo ${item.imgs[2]}"></div></div>
            <article class="about-card project-info">
              <div class="badge-row"><span class="badge accent">⌖ ${item.place}</span><span class="badge">${item.date}</span><span class="badge">Compensation: ${item.pay}</span></div>
              <h1 style="margin-top:24px;font-size:42px;line-height:1">${item.title}</h1>
              <div class="meta-row" style="margin-top:14px">⌖ ${item.place} · ◴ 30 Apr 2026 · ▧ Budget TBD · ★ TFP</div>
              <h2 style="margin-top:28px">Opportunity Goals</h2>
              <p>${item.desc}</p>
            </article>
          </div>
          <aside class="side-stack">
            <section class="side-card"><h3>Required Roles</h3><div class="fact-list"><div class="fact"><span>Model</span><strong style="color:var(--success)">Open</strong></div></div><button class="btn btn-secondary" style="width:100%;margin-top:16px" data-save>Apply for Role</button></section>
            <section class="side-card"><h3>Creator</h3><p>Elena Rodriguez Updated</p><button class="btn btn-primary" style="width:100%;margin-top:16px">Sign in to chat with creator</button></section>
          </aside>
        </section>`;
    }

    function eventDetail() {
      const item = data.events[0];
      return `
        <section class="detail-split-hero">
          <div class="photo detail-split-media ${item.imgs[0]}"></div>
          <div class="detail-split-content"><h1>${item.title}</h1><div class="badge-row"><span class="badge">${item.place}</span><span class="badge">${item.date}</span><span class="badge">RSVP open</span></div><div class="hero-actions"><button class="btn btn-primary" data-save>Reserve Spot</button></div></div>
        </section>
        <section class="about-grid" style="margin-top:24px"><article class="about-card"><h2>Event brief</h2><p>${item.desc}</p></article><aside class="side-card"><h3>Details</h3><div class="fact-list"><div class="fact"><span>Location</span><strong>${item.place}</strong></div><div class="fact"><span>Date</span><strong>${item.date}</strong></div></div></aside></section>`;
    }

    function submissions() {
      const photos = ["p-city", "p-fashion", "p-model", "p-portrait", "p-editorial", "p-studio", "p-runway", "p-event"];
      return `
        <header class="page-header"><div><h1>Contest Submissions</h1><p>Moderated gallery view with vote counts and creator attribution.</p></div><a href="#contest-detail" class="btn btn-primary">Back to contest</a></header>
        <div class="submissions-grid">${photos.map((p, i) => `<article class="submission-card"><div class="photo ${p}"></div><div class="submission-meta"><span>Creator ${i + 1}</span><span>♡ ${38 + i * 9}</span></div></article>`).join("")}</div>`;
    }

    function createPage(type) {
      const label = type[0].toUpperCase() + type.slice(1);
      return `
        <section class="form-layout">
          <aside class="form-card"><span class="eyebrow">Create flow</span><h1 style="margin-top:18px;font-size:46px">Create ${label}</h1><p class="lead">A standalone version of the creation workflow with app-matched fields, upload panel, moderation note, and save action.</p><div class="upload-zone"><strong>Drop cover image</strong><br>JPG, PNG, or WebP</div></aside>
          <form class="form-card" data-demo-form>
            <div class="form-grid"><label>Title<input value="${label} title" /></label><label>Location<input value="Mumbai, India" /></label><label>Date<input value="May 24, 2026" /></label><label>Category<select><option>Fashion</option><option>Portrait</option><option>Street</option></select></label></div>
            <label style="margin-top:16px">Description<textarea>Describe the creative brief, expectations, timing, deliverables, and moderation-safe requirements.</textarea></label>
            <div class="form-grid" style="margin-top:16px"><label>Compensation<select><option>TFP</option><option>Paid</option><option>Negotiable</option></select></label><label>Status<select><option>Submit for review</option><option>Draft</option></select></label></div>
            <button class="btn btn-primary" style="width:100%;margin-top:20px" type="submit">Save ${label}</button>
          </form>
        </section>`;
    }

    function home() {
      return `
        <section class="home-hero">
          <div class="home-copy">
            <span class="eyebrow">TFP Photographers</span>
            <h1>Create with the right visual crew.</h1>
            <p>Find modelling, photography, styling, makeup, film, events, contests, submissions, and portfolio collaborations in one polished demo prototype.</p>
            <div class="hero-actions"><a class="btn btn-primary" href="#projects">Explore Opportunities</a><a class="btn btn-secondary" href="#contests">View Contests</a></div>
          </div>
          <div class="home-gallery"><div class="photo photo-main p-fashion"></div><div class="photo p-model"></div><div class="photo p-editorial"></div></div>
        </section>
        <header class="page-header" style="margin-top:42px"><div><h1 style="font-size:34px">Featured opportunities</h1><p>Cards, badges, moodboards, and detail routes matching the real app style.</p></div><a class="btn btn-secondary" href="#create-project">Create project</a></header>
        <div class="listing-grid">${data.projects.map(item => listingCard(item, "projects")).join("")}</div>`;
    }

    function render() {
      homeEl("home", home());
      homeEl("projects", listingPage("projects", "TFP Projects", "Find modelling, photography, designer, glamour, and film opportunities in one place.", "#create-project"));
      homeEl("contests", listingPage("contests", "TFP Contests", "Join creative challenges, browse prize briefs, and submit moderated image entries.", "#create-contest"));
      homeEl("events", listingPage("events", "TFP Events", "Discover portfolio walks, workshops, meetups, and studio sessions.", "#create-event"));
      homeEl("project-detail", projectDetail());
      homeEl("contest-detail", contestDetail());
      homeEl("event-detail", eventDetail());
      homeEl("submissions", submissions());
      homeEl("create-project", createPage("project"));
      homeEl("create-contest", createPage("contest"));
      homeEl("create-event", createPage("event"));
    }

    function homeEl(id, html) { document.getElementById(id).innerHTML = html; }

    function route() {
      const id = (location.hash || "#home").slice(1);
      views.forEach(view => view.classList.toggle("is-active", view.id === id));
      document.querySelectorAll(".nav-link").forEach(link => {
        const nav = link.getAttribute("href").slice(1);
        link.classList.toggle("is-active", nav === id || (id.includes("detail") && nav === `${id.split("-")[0]}s`));
      });
      window.scrollTo(0, 0);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    render();
    route();
    window.addEventListener("hashchange", route);
    document.addEventListener("click", event => {
      if (event.target.closest("[data-save]")) showToast("Prototype action completed");
    });
    document.addEventListener("submit", event => {
      if (event.target.matches("[data-demo-form]")) {
        event.preventDefault();
        showToast("Saved in prototype mode");
      }
    });
  </script>
</body>
</html>
